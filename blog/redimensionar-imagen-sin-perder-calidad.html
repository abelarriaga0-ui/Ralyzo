<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Cómo Optimizar Imágenes para Web y Mejorar la Velocidad | Ralyzo</title>

  <style>

    /* ===== FIX GLOBAL (NUEVO) ===== */
    html, body{
      width:100%;
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      font-family:'Inter',sans-serif;
      overflow-x:hidden;
    }

    *{
      box-sizing:border-box;
    }

    /* ===== HEADER ===== */
    .site-header{
      position:sticky;
      top:0;
      z-index:1000;
      background:#0B1220;
      overflow:hidden; /* FIX */
    }

    .header-inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:24px;
      min-height:76px;
      width:100%; /* FIX */
      max-width:100%; /* FIX */
      padding:0 16px;
    }

    .logo{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
    }

    .main-nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      min-width:0; /* FIX */
      max-width:100%; /* FIX */
    }

    .nav-link{
      padding:10px 12px;
      color:#CBD5E1;
    }

    .header-actions{
      display:flex;
      gap:10px;
      min-width:0; /* FIX */
      max-width:100%; /* FIX */
    }

    .btn{
      padding:12px 16px;
      border-radius:12px;
      border:none;
      cursor:pointer;
    }

    .btn-primary{
      background:#4F46E5;
      color:#fff;
    }

    /* ===== HERO ===== */
    .hero{
      padding:40px 16px;
    }

    .hero-card{
      padding:24px;
      background:#111C31;
      border-radius:20px;
    }

    /* ===== CONTENT ===== */
    .content-wrap{
      padding:20px 16px;
    }

    .content-grid{
      display:grid;
      grid-template-columns:1fr 300px;
      gap:20px;
    }

    .article-card{
      background:#111C31;
      padding:24px;
      border-radius:20px;
    }

    .sidebar{
      display:flex;
      flex-direction:column;
      gap:16px;
    }

    .sidebar-card{
      background:#111C31;
      padding:20px;
      border-radius:16px;
    }

    /* ===== RELATED ===== */
    .related-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:16px;
      padding:20px 16px;
    }

    .related-card{
      background:#111C31;
      padding:20px;
      border-radius:16px;
    }

    /* ===== FOOTER ===== */
    .footer-card{
      background:#111C31;
      padding:24px;
      margin:20px;
      border-radius:20px;
    }

    /* ===== RESPONSIVE FIX (CLAVE) ===== */
    @media (max-width:900px){

      .content-grid{
        grid-template-columns:1fr;
      }

      .related-grid{
        grid-template-columns:1fr 1fr;
      }

    }

    @media (max-width:560px){

      .header-inner{
        flex-direction:column;
        align-items:flex-start;
        width:100%;
        max-width:100%;
      }

      .main-nav{
        width:100%;
        max-width:100%;
      }

      .header-actions{
        width:100%;
        max-width:100%;
      }

      .header-actions .btn{
        width:100%; /* FIX PRINCIPAL */
        max-width:100%;
      }

      .content-grid{
        grid-template-columns:1fr;
      }

      .related-grid{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">RALYZO</div>

    <nav class="main-nav">
      <a href="/" class="nav-link">Herramientas</a>
      <a href="/precios.html" class="nav-link">Precios</a>
      <a href="/blog/index.html" class="nav-link">Blog</a>
    </nav>

    <div class="header-actions">
      <button class="btn btn-primary">Probar herramientas</button>
    </div>
  </div>
</header>

<section class="hero">
  <div class="hero-card">
    <h1>Cómo optimizar imágenes para web</h1>
    <p>Mejora velocidad, SEO y rendimiento con imágenes optimizadas.</p>
  </div>
</section>

<section class="content-wrap">
  <div class="content-grid">

    <article class="article-card">
      <h2>Optimización de imágenes</h2>
      <p>Contenido del artículo...</p>
    </article>

    <aside class="sidebar">
      <div class="sidebar-card">
        <h3>Herramientas</h3>
      </div>
    </aside>

  </div>
</section>

<section class="related-grid">
  <div class="related-card">Artículo 1</div>
  <div class="related-card">Artículo 2</div>
  <div class="related-card">Artículo 3</div>
</section>

<footer>
  <div class="footer-card">
    © 2026 Ralyzo
  </div>
</footer>

</body>
</html>
