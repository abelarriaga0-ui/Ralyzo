<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PNG a JPG | Ralyzo</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Inter,sans-serif;
background:#0B1220;
color:#F8FAFC;
margin:0;
text-align:center;
}

header{
padding:20px;
border-bottom:1px solid #1F2937;
}

.logo{
font-weight:600;
font-size:20px;
}

.logo a{
color:#F8FAFC;
text-decoration:none;
}

.container{
padding:80px 20px;
}

.upload{
border:2px dashed #2563EB;
padding:60px;
border-radius:10px;
margin-top:30px;
}

button{
margin-top:20px;
background:#2563EB;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}

img{
margin-top:20px;
max-width:300px;
border-radius:10px;
}

</style>

</head>

<body>

<header>
<div class="logo"><a href="index.html">◢ RALYZO</a></div>
</header>

<div class="container">

<h1>Convertir PNG a JPG</h1>

<p>Convierte imágenes PNG a formato JPG rápidamente.</p>

<div class="upload">

<input type="file" id="imageInput" accept="image/png">

<br>

<button onclick="convert()">Convertir</button>

</div>

<p id="status"></p>

</div>

<script>

function convert(){

let file = document.getElementById("imageInput").files[0]

if(!file){
alert("Selecciona un archivo PNG")
return
}

document.getElementById("status").innerText = "Convirtiendo imagen..."

let reader = new FileReader()

reader.onload = function(event){

let img = new Image()

img.src = event.target.result

img.onload = function(){

let canvas = document.createElement("canvas")
let ctx = canvas.getContext("2d")

canvas.width = img.width
canvas.height = img.height

ctx.fillStyle = "#ffffff"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.drawImage(img,0,0)

canvas.toBlob(function(blob){

let url = URL.createObjectURL(blob)

document.getElementById("status").innerHTML = `
<br>
<img src="${url}">
<br><br>
<a href="${url}" download="imagen.jpg">
<button>Descargar JPG</button>
</a>
`

},"image/jpeg",0.9)

}

}

reader.readAsDataURL(file)

}

</script>

</body>
</html>
