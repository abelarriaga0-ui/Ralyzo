<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Comprimir Imagen Online Gratis | Ralyzo</title>
  <meta name="description" content="Comprime imágenes online gratis con Ralyzo. Reduce el peso de archivos JPG y PNG sin instalar programas y directamente desde tu navegador." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://ralyzo.com/comprimir-imagen" />

  <meta property="og:title" content="Comprimir Imagen Online Gratis | Ralyzo" />
  <meta property="og:description" content="Reduce el tamaño de tus imágenes JPG y PNG online gratis y sin instalar programas." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ralyzo.com/comprimir-imagen" />
  <meta property="og:site_name" content="Ralyzo" />

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8337166112417872"
    crossorigin="anonymous"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:#0B1220;
      color:#F8FAFC;
    }

    header{
      position:sticky;
      top:0;
      z-index:1000;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px 40px;
      border-bottom:1px solid #1F2937;
      background:rgba(11,18,32,.88);
      backdrop-filter:blur(10px);
      gap:20px; /* 🔥 AÑADIDO */
    }

    .logo{
      font-weight:700;
      font-size:20px;
      letter-spacing:1px;
      text-align:center;
    }

    .logo a{
      color:#F8FAFC;
      text-decoration:none;
    }

    /* 🔥 NUEVO: dropdown al lado del logo */
    .header-tool-select{
      padding:10px 14px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0F172A;
      color:#CBD5E1;
      font-size:14px;
      cursor:pointer;
    }

    .header-tool-select:focus{
      border-color:#2563EB;
      outline:none;
    }

    .page{
      max-width:1000px;
      margin:0 auto;
      padding:40px 20px 60px;
    }

    h1{
      font-size:42px;
      margin:0 0 12px;
      text-align:center;
    }

    .subtitle{
      text-align:center;
      color:#94A3B8;
      margin-bottom:40px;
    }

    .card{
      background:#111827;
      border:1px solid #1F2937;
      border-radius:16px;
      padding:24px;
      margin-bottom:24px;
    }

    .upload{
      border:2px dashed #2563EB;
      border-radius:14px;
      padding:40px 20px;
      text-align:center;
      background:rgba(37,99,235,.06);
    }

    input[type="file"]{
      margin-top:16px;
      color:#F8FAFC;
    }

    .controls{
      display:grid;
      gap:16px;
      margin-top:24px;
    }

    label{
      font-size:14px;
      color:#CBD5E1;
      display:block;
      margin-bottom:8px;
    }

    select{
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0F172A;
      color:#F8FAFC;
    }

    button{
      background:#2563EB;
      color:#fff;
      border:none;
      padding:14px 20px;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      font-weight:600;
    }

    button:hover{
      opacity:.95;
    }

    button:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .preview-wrap{
      display:grid;
      gap:24px;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      margin-top:24px;
    }

    .preview-box{
      background:#0F172A;
      border:1px solid #1F2937;
      border-radius:14px;
      padding:16px;
    }

    .preview-box h3{
      margin-top:0;
      font-size:18px;
    }

    .preview-box img{
      width:100%;
      max-height:320px;
      object-fit:contain;
      border-radius:10px;
      background:#020617;
    }

    .meta{
      margin-top:12px;
      color:#94A3B8;
      font-size:14px;
      line-height:1.7;
    }

    .status{
      margin-top:18px;
      color:#93C5FD;
      text-align:center;
      min-height:24px;
    }

    .download{
      display:inline-block;
      margin-top:14px;
      background:#10B981;
      color:#fff;
      text-decoration:none;
      padding:12px 16px;
      border-radius:10px;
      font-weight:600;
      border:none;
      cursor:pointer;
    }

    footer{
      margin-top:40px;
      padding:20px;
      border-top:1px solid #1F2937;
      text-align:center;
      color:#94A3B8;
      font-size:14px;
    }

    footer a{
      color:#93C5FD;
      text-decoration:none;
      margin:0 4px;
    }

    footer a:hover{
      text-decoration:underline;
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><a href="/">◢ RALYZO</a></div>

  <!-- 🔥 AQUI ESTA EL MENU (AL LADO DEL LOGO) -->
  <select class="header-tool-select" id="headerToolSelect">
    <option value="">Ir a otra herramienta</option>
    <option value="/png-a-jpg">PNG a JPG</option>
    <option value="/jpg-a-png">JPG a PNG</option>
    <option value="/redimensionar-imagen">Redimensionar</option>
    <option value="/recortar-imagen">Recortar</option>
    <option value="/girar-imagen">Girar</option>
  </select>
</header>

<!-- TODO EL RESTO IGUAL (NO TOCADO) -->

<script>
document.getElementById("headerToolSelect").addEventListener("change", function(){
  if(this.value){
    window.location.href = this.value;
  }
});
</script>

</body>
</html>
