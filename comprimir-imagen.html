<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Comprimir Imagen Online Gratis | Ralyzo</title>
  <meta name="description" content="Comprime imágenes online gratis con Ralyzo. Reduce el peso de archivos JPG y PNG sin instalar programas." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://ralyzo.com/comprimir-imagen" />

  <!-- 🔥 AdSense (YA BIEN PUESTO) -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8337166112417872"
     crossorigin="anonymous"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,sans-serif;
      background:#0B1220;
      color:#F8FAFC;
    }

    header{
      position:sticky;
      top:0;
      z-index:1000;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px 40px;
      border-bottom:1px solid #1F2937;
      background:rgba(11,18,32,.88);
      backdrop-filter:blur(10px);
    }

    .logo{
      font-weight:700;
      font-size:20px;
    }

    .logo a{
      color:#F8FAFC;
      text-decoration:none;
    }

    .page{
      max-width:1000px;
      margin:0 auto;
      padding:40px 20px 60px;
    }

    h1{
      font-size:42px;
      margin:0 0 12px;
      text-align:center;
    }

    .subtitle{
      text-align:center;
      color:#94A3B8;
      margin-bottom:40px;
    }

    .card{
      background:#111827;
      border:1px solid #1F2937;
      border-radius:16px;
      padding:24px;
      margin-bottom:24px;
    }

    .upload{
      border:2px dashed #2563EB;
      border-radius:14px;
      padding:40px 20px;
      text-align:center;
      background:rgba(37,99,235,.06);
    }

    input[type="file"]{
      margin-top:16px;
      color:#F8FAFC;
    }

    .controls{
      display:grid;
      gap:16px;
      margin-top:24px;
    }

    label{
      font-size:14px;
      color:#CBD5E1;
      display:block;
      margin-bottom:8px;
    }

    select{
      width:100%;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0F172A;
      color:#F8FAFC;
    }

    button{
      background:#2563EB;
      color:#fff;
      border:none;
      padding:14px 20px;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      font-weight:600;
    }

    .preview-wrap{
      display:grid;
      gap:24px;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      margin-top:24px;
    }

    .preview-box{
      background:#0F172A;
      border:1px solid #1F2937;
      border-radius:14px;
      padding:16px;
    }

    .preview-box img{
      width:100%;
      max-height:320px;
      object-fit:contain;
      border-radius:10px;
      background:#020617;
    }

    .meta{
      margin-top:12px;
      color:#94A3B8;
      font-size:14px;
    }

    .status{
      margin-top:18px;
      color:#93C5FD;
      text-align:center;
    }

    .download{
      margin-top:14px;
      background:#10B981;
      color:#fff;
      padding:12px 16px;
      border-radius:10px;
      cursor:pointer;
      border:none;
    }

    .seo-section{
      margin-top:40px;
    }

    footer{
      margin-top:40px;
      padding:20px;
      border-top:1px solid #1F2937;
      text-align:center;
      color:#94A3B8;
      font-size:14px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo"><a href="/">◢ RALYZO</a></div>
</header>

<main class="page">

  <h1>Comprimir Imagen</h1>
  <p class="subtitle">Reduce el tamaño de tus imágenes desde el navegador.</p>

  <section class="card">
    <div class="upload">
      <p>Selecciona una imagen JPG, JPEG o PNG</p>
      <input type="file" id="imageInput" accept="image/png, image/jpeg, image/jpg" />
    </div>

    <div class="controls">
      <div>
        <label>Nivel de compresión</label>
        <select id="quality">
          <option value="0.9">Baja compresión</option>
          <option value="0.7" selected>Media</option>
          <option value="0.5">Alta</option>
        </select>
      </div>

      <button id="compressBtn">Comprimir imagen</button>
    </div>

    <p id="status" class="status"></p>
  </section>

  <section id="resultSection" class="preview-wrap" style="display:none;">
    <div class="preview-box">
      <h3>Original</h3>
      <img id="originalPreview">
      <div id="originalMeta" class="meta"></div>
    </div>

    <div class="preview-box">
      <h3>Comprimida</h3>
      <img id="compressedPreview">
      <div id="compressedMeta" class="meta"></div>
      <button id="downloadBtn" class="download">Descargar</button>
    </div>
  </section>

</main>

<footer>
  © 2026 Ralyzo
</footer>

<script>
const imageInput = document.getElementById("imageInput");
const compressBtn = document.getElementById("compressBtn");
const qualitySelect = document.getElementById("quality");
const statusText = document.getElementById("status");

const resultSection = document.getElementById("resultSection");
const originalPreview = document.getElementById("originalPreview");
const compressedPreview = document.getElementById("compressedPreview");
const originalMeta = document.getElementById("originalMeta");
const compressedMeta = document.getElementById("compressedMeta");
const downloadBtn = document.getElementById("downloadBtn");

let compressedUrl = "";

function formatBytes(bytes){
  return (bytes/1024).toFixed(1)+" KB";
}

compressBtn.onclick = async ()=>{
  const file = imageInput.files[0];
  if(!file){ alert("Sube una imagen"); return; }

  statusText.textContent = "Procesando...";

  const img = new Image();
  img.src = URL.createObjectURL(file);

  img.onload = async ()=>{
    originalPreview.src = img.src;
    originalMeta.innerHTML = "Tamaño: "+formatBytes(file.size);

    const canvas = document.createElement("canvas");
    canvas.width = img.width;
    canvas.height = img.height;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(img,0,0);

    canvas.toBlob(blob=>{
      compressedUrl = URL.createObjectURL(blob);
      compressedPreview.src = compressedUrl;

      compressedMeta.innerHTML = "Tamaño: "+formatBytes(blob.size);

      resultSection.style.display="grid";
      statusText.textContent="Listo";
    },"image/jpeg",parseFloat(qualitySelect.value));
  }
}

downloadBtn.onclick = ()=>{
  const a = document.createElement("a");
  a.href = compressedUrl;
  a.download = "ralyzo.jpg";
  a.click();
}
</script>

</body>
</html>
