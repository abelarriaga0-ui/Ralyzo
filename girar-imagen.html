<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Girar imagen online | Ralyzo</title>
  <meta name="description" content="Gira imágenes online gratis con Ralyzo.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo"><a href="index.html">◢ RALYZO</a></div>
</header>

<main class="page">
  <h1>Girar imagen</h1>
  <p class="subtitle">Rota tus imágenes en segundos.</p>

  <section class="card">
    <div class="upload">
      <p>Selecciona una imagen</p>
      <input type="file" id="imageInput" accept="image/png, image/jpeg, image/jpg">
    </div>

    <div class="controls">
      <div>
        <label for="angleSelect">Ángulo</label>
        <select id="angleSelect">
          <option value="90">90°</option>
          <option value="180">180°</option>
          <option value="270">270°</option>
        </select>
      </div>

      <button id="runBtn">Girar imagen</button>
    </div>

    <p id="status" class="status"></p>
  </section>

  <section id="resultSection" class="preview-wrap" style="display:none;">
    <div class="preview-box">
      <h3>Original</h3>
      <img id="originalPreview">
      <div id="originalMeta" class="meta"></div>
    </div>

    <div class="preview-box">
      <h3>Giradа</h3>
      <img id="resultPreview">
      <div id="resultMeta" class="meta"></div>
      <a id="downloadLink" class="download">Descargar</a>
    </div>
  </section>
</main>

<footer>© 2026 Ralyzo</footer>

<script src="js/girar-imagen.js"></script>
</body>
</html>
