<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editar Texto en Imagen Online | Ralyzo</title>
<meta name="description" content="Edita texto dentro de imágenes online gratis. Detecta texto automáticamente y modifícalo manualmente con control total: tamaño, fuente, color y posición.">

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8337166112417872"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/konva@9/konva.min.js"></script>

<style>
body{
margin:0;
font-family:Inter,sans-serif;
background:#020B1F;
color:#fff;
}

header{
text-align:center;
padding:15px;
font-weight:800;
font-size:20px;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.left{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:#0B1220;
position:relative;
}

#canvas-container{
width:100%;
height:100%;
}

.right{
width:280px;
background:#111827;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.primary{background:#2563EB;color:#fff;}
.secondary{background:#1F2937;color:#fff;}
.success{background:#16A34A;color:#fff;}
.danger{background:#DC2626;color:#fff;}

input,select{
width:100%;
padding:8px;
border-radius:6px;
border:none;
background:#0B1325;
color:#fff;
}

label{
font-size:13px;
color:#aaa;
}

.hidden{display:none}
</style>
</head>

<body>

<header>RALYZO • EDITAR TEXTO EN IMAGEN</header>

<div class="container">

<div class="left">
<div id="canvas-container"></div>
</div>

<div class="right">

<button class="primary" id="uploadBtn">Subir imagen</button>
<input type="file" id="fileInput" class="hidden" accept="image/*">

<button class="secondary" id="ocrBtn">Detectar texto</button>

<hr>

<label>Texto</label>
<input type="text" id="textInput">

<label>Tamaño</label>
<input type="number" id="fontSize" value="20">

<label>Fuente</label>
<select id="fontFamily">
<option>Arial</option>
<option>Times New Roman</option>
<option>Verdana</option>
<option>Courier New</option>
</select>

<label>Color</label>
<input type="color" id="colorPicker" value="#000000">

<button class="secondary" id="boldBtn">Negrita</button>
<button class="secondary" id="italicBtn">Cursiva</button>
<button class="secondary" id="underlineBtn">Subrayado</button>

<hr>

<button class="success" id="downloadBtn">Descargar</button>
<button class="danger" id="resetBtn">Reset</button>

</div>

</div>

<script>
let stage = new Konva.Stage({
container: 'canvas-container',
width: window.innerWidth - 280,
height: window.innerHeight - 60
});

let layer = new Konva.Layer();
stage.add(layer);

let imageNode;
let selectedText;

document.getElementById('uploadBtn').onclick = () => fileInput.click();

fileInput.onchange = (e)=>{
let file = e.target.files[0];
let img = new Image();
img.onload = ()=>{
layer.destroyChildren();

imageNode = new Konva.Image({
image: img,
width: stage.width(),
height: stage.height()
});

layer.add(imageNode);
layer.draw();
}
img.src = URL.createObjectURL(file);
}

document.getElementById('ocrBtn').onclick = async ()=>{
if(!imageNode) return;

let dataURL = stage.toDataURL();

const { data } = await Tesseract.recognize(dataURL,'spa');

data.words.forEach(w=>{
let textNode = new Konva.Text({
text: w.text,
x: w.bbox.x0,
y: w.bbox.y0,
fontSize:20,
draggable:true,
fill:'#000'
});

textNode.on('click',()=>{
selectedText = textNode;
textInput.value = textNode.text();
});

layer.add(textNode);
});

layer.draw();
}

textInput.oninput = ()=>{
if(selectedText) selectedText.text(textInput.value), layer.draw();
}

fontSize.oninput = ()=>{
if(selectedText) selectedText.fontSize(parseInt(fontSize.value)), layer.draw();
}

fontFamily.onchange = ()=>{
if(selectedText) selectedText.fontFamily(fontFamily.value), layer.draw();
}

colorPicker.oninput = ()=>{
if(selectedText) selectedText.fill(colorPicker.value), layer.draw();
}

boldBtn.onclick = ()=>{
if(selectedText){
selectedText.fontStyle(selectedText.fontStyle()==='bold'?'normal':'bold');
layer.draw();
}
}

italicBtn.onclick = ()=>{
if(selectedText){
selectedText.fontStyle(selectedText.fontStyle()==='italic'?'normal':'italic');
layer.draw();
}
}

underlineBtn.onclick = ()=>{
if(selectedText){
selectedText.textDecoration(selectedText.textDecoration()==='underline'?'':'underline');
layer.draw();
}
}

downloadBtn.onclick = ()=>{
let url = stage.toDataURL();
let a = document.createElement('a');
a.href = url;
a.download = 'editado.png';
a.click();
}

resetBtn.onclick = ()=>{
layer.destroyChildren();
layer.draw();
}
</script>

</body>
</html>
