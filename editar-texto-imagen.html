<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editar texto en imagen online GRATIS | OCR + Editor visual</title>
<meta name="description" content="Edita texto dentro de imágenes online gratis. Detecta texto automáticamente con OCR y modifícalo directamente sobre la imagen.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
    margin:0;
    font-family:Inter,sans-serif;
    background:#0B1220;
    color:#fff;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
}

.logo{
    font-weight:700;
    display:flex;
    align-items:center;
    gap:10px;
}

.logo::before{
    content:"";
    width:12px;
    height:12px;
    background:white;
    clip-path:polygon(0 0,100% 50%,0 100%);
}

/* HERO */
.hero{
    text-align:center;
    padding:40px 20px;
}

.hero h1{
    font-size:32px;
    margin-bottom:10px;
}

.hero p{
    color:#9CA3AF;
}

/* BOTONES */
.actions{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:20px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.primary{
    background:#3B82F6;
    color:white;
}

.secondary{
    background:#1F2937;
    color:white;
}

/* LIENZO */
.editor-container{
    max-width:900px;
    margin:auto;
    position:relative;
}

.canvas{
    position:relative;
    border:2px dashed #334155;
    border-radius:12px;
    overflow:hidden;
}

.canvas img{
    width:100%;
    display:block;
}

/* BLOQUES EDITABLES */
.text-block{
    position:absolute;
    border:1px dashed rgba(255,255,255,0.3);
    padding:2px;
    cursor:text;
}

.text-block[contenteditable="true"]:focus{
    outline:2px solid #3B82F6;
    background:rgba(0,0,0,0.4);
}

/* PANEL */
.panel{
    max-width:900px;
    margin:20px auto;
}

.panel-content{
    display:none;
    margin-top:10px;
}

.panel.open .panel-content{
    display:block;
}

/* MOBILE */
@media(max-width:600px){
    .hero h1{
        font-size:24px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">RALYZO</div>
    <nav>Herramientas · Precios · Blog</nav>
</header>

<section class="hero">
    <h1>Editar texto en imagen</h1>
    <p>Haz clic sobre el texto detectado y edítalo directamente</p>
</section>

<div class="actions">
    <input type="file" id="fileInput" hidden>
    <button class="secondary" onclick="fileInput.click()">Subir imagen</button>
    <button class="primary" onclick="detectar()">Detectar texto</button>
    <button class="primary" onclick="descargar()">Descargar</button>
</div>

<div class="editor-container">
    <div class="canvas" id="canvas">
        <img id="img">
    </div>
</div>

<div class="panel" id="panel">
    <button class="secondary" onclick="togglePanel()">Edición manual</button>
    <div class="panel-content">
        <p style="color:#9CA3AF">Opciones avanzadas (en desarrollo)</p>
    </div>
</div>

<script>
const fileInput = document.getElementById("fileInput");
const img = document.getElementById("img");
const canvas = document.getElementById("canvas");

fileInput.addEventListener("change", e=>{
    const file = e.target.files[0];
    img.src = URL.createObjectURL(file);
});

/* OCR LIMPIO */
async function detectar(){
    const result = await Tesseract.recognize(img.src,'spa');

    document.querySelectorAll(".text-block").forEach(e=>e.remove());

    result.data.words.forEach(w=>{
        if(w.text.trim().length < 3) return;
        if(w.confidence < 70) return;

        const block = document.createElement("div");
        block.className = "text-block";
        block.contentEditable = true;

        block.innerText = w.text;

        block.style.left = w.bbox.x0 + "px";
        block.style.top = w.bbox.y0 + "px";
        block.style.width = (w.bbox.x1 - w.bbox.x0) + "px";
        block.style.height = (w.bbox.y1 - w.bbox.y0) + "px";

        canvas.appendChild(block);
    });
}

/* DESCARGAR */
function descargar(){
    html2canvas(canvas).then(canvas=>{
        const link = document.createElement("a");
        link.download = "resultado.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}

/* PANEL */
function togglePanel(){
    document.getElementById("panel").classList.toggle("open");
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
